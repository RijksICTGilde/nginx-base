name: Build and Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build base image
        run: docker build -t nginx-base .

      - name: Build test image with sample content
        run: |
          mkdir -p /tmp/test-site
          echo '<html><body>ok</body></html>' > /tmp/test-site/index.html
          cat <<'DOCKERFILE' > /tmp/test-site/Dockerfile
          FROM nginx-base
          COPY index.html /usr/share/nginx/html/index.html
          DOCKERFILE
          docker build -t nginx-base-test /tmp/test-site

      - name: Trivy CVE scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: nginx-base
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Dump versions
        run: |
          echo "=== Nginx version ==="
          docker run --rm nginx-base-test nginx -v
          echo "=== Alpine version ==="
          docker run --rm nginx-base-test cat /etc/alpine-release
          echo "=== OpenSSL version ==="
          docker run --rm nginx-base-test openssl version

      - name: Verify nginx config
        run: docker run --rm nginx-base-test nginx -t

      - name: Verify non-root
        run: |
          USER=$(docker run --rm nginx-base-test id -u)
          echo "Running as UID: $USER"
          if [ "$USER" = "0" ]; then
            echo "FAIL: container is running as root"
            exit 1
          fi

      - name: Verify server starts and responds
        run: |
          docker run -d --name test-server -p 8080:8080 nginx-base-test
          sleep 2
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          echo "HTTP status: $STATUS"
          docker logs test-server
          docker stop test-server
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: expected 200, got $STATUS"
            exit 1
          fi

      - name: Verify security headers
        run: |
          docker run -d --name header-test -p 8081:8080 nginx-base-test
          sleep 2
          HEADERS=$(curl -sI http://localhost:8081/)
          echo "$HEADERS"
          docker stop header-test
          echo "$HEADERS" | grep -qi "x-content-type-options: nosniff" || { echo "FAIL: missing X-Content-Type-Options"; exit 1; }
          echo "$HEADERS" | grep -qi "x-frame-options: SAMEORIGIN" || { echo "FAIL: missing X-Frame-Options"; exit 1; }
          echo "$HEADERS" | grep -qi "referrer-policy" || { echo "FAIL: missing Referrer-Policy"; exit 1; }
          echo "$HEADERS" | grep -qi "strict-transport-security" || { echo "FAIL: missing Strict-Transport-Security"; exit 1; }

      - name: Verify version not exposed
        run: |
          docker run -d --name version-test -p 8082:8080 nginx-base-test
          sleep 2
          HEADERS=$(curl -sI http://localhost:8082/)
          docker stop version-test
          if echo "$HEADERS" | grep -q "Server: nginx/"; then
            echo "FAIL: nginx version is exposed in Server header"
            exit 1
          fi
          echo "PASS: nginx version not exposed"
